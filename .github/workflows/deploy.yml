name: Deploy

on:
  push:
    paths:
      - prisma/migrations/** # Run this workflow when migrations are updated
      - prisma/schema.prisma # Good to trigger if the schema changes too
    branches:
      - main
  workflow_dispatch: # Allow manual triggering from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your version
          cache: 'npm'
        
      - name: Install dependencies
        run: npm install
        
      - name: Apply all pending migrations to the database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
